services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yolo
      POSTGRES_PASSWORD: yolo
      POSTGRES_DB: labs_simple_store   # default Database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: